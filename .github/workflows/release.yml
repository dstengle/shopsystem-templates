name: release

# On a version-tag release of shopsystem-templates, notify the
# bc-launcher so it can rebuild downstream images / re-pour shops against
# the newly released templates package.
#
# Scenario 26ca8a14e01db50c (lead-jx4u): on a version-tag release of
# shopsystem-templates, its release workflow emits a repository_dispatch
# to the shopsystem-bc-launcher repository, carrying a credential
# authorized to dispatch.
on:
  push:
    tags:
      - "v*"

jobs:
  dispatch-bc-launcher:
    runs-on: ubuntu-latest
    steps:
      - name: Notify shopsystem-bc-launcher of the new release
        # A cross-repository repository_dispatch cannot use the default
        # GITHUB_TOKEN (scoped to this repo); it must carry a token
        # authorized to dispatch to shopsystem-bc-launcher. That token is
        # provided as the BC_LAUNCHER_DISPATCH_TOKEN repository secret.
        env:
          BC_LAUNCHER_DISPATCH_TOKEN: ${{ secrets.BC_LAUNCHER_DISPATCH_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${BC_LAUNCHER_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository_owner }}/shopsystem-bc-launcher/dispatches" \
            -d "{\"event_type\":\"shopsystem-templates-released\",\"client_payload\":{\"tag\":\"${RELEASE_TAG}\"}}"
