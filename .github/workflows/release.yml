name: release

# Version-tag release workflow for shopsystem-templates.
#
# Per ADR-022 the cross-repo dispatch fan-in that previously notified the
# bc-launcher on each release has been RETIRED (it superseded ADR-021 D2).
# Downstream propagation is now handled by the centralized scheduled poll
# in the bc-launcher (version-bump-then-rebuild), so this workflow emits
# NOTHING downstream on release. What remains is the release-process
# safeguard below: a version-hygiene guard that fails a tag cut with a
# lagging pyproject.
on:
  push:
    tags:
      - "v*"

jobs:
  release-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the tagged commit
        uses: actions/checkout@v4

      - name: Guard — the pushed tag must match pyproject [project].version
        # Release-process safeguard (scenario 192, 88a5418db371a12a): a tag
        # cut with a lagging pyproject ships bad dist metadata (the v0.21.0
        # -> 0.20.0 regression). This step runs the committed, in-repo
        # unit-tested guard script and fails the run on any tag-vs-pyproject
        # mismatch, so a bad tag never ships.
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 scripts/check_tag_matches_pyproject_version.py \
            --tag "${RELEASE_TAG}" \
            --pyproject pyproject.toml
