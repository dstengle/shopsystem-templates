# compose.yaml — lead-shop ops scaffolding (shop-owned, PDR-003 path F).
#
# Brings up the product postgres (and the agent-vault credential broker)
# that the lead shop and its BC clones share. Run it via ./bin/shop-shell,
# or directly with:
#
#     docker compose up -d postgres
#
# PRODUCT-SCOPED: every name below derives from the bootstrap product slug
# ({{OPS_SLUG}}) so a second product can run alongside other live products
# without colliding on container names, the docker network, named volumes,
# or host
# ports. The slug is the bootstrap --shop-name with a trailing "-product"
# stripped (e.g. dummyco-product -> dummyco), read from .claude/shop/name.md.
#
# The pgdata bind source is derived from {{OPS_SLUG_UPPER}}_DATA (default
# ${HOME}/.local/share/{{OPS_SLUG}}) and deliberately lives OUTSIDE this
# repository so a `docker compose up` never pollutes the shop tree with a
# pgdata/ directory.
#
# HOST PORTS are product-distinct: the published postgres host port defaults
# to a deterministic slug-derived value ({{OPS_POSTGRES_PORT}} =
# 5432 + crc32(slug) % 1000) and is env-overridable via
# {{OPS_SLUG_UPPER}}_POSTGRES_PORT, so two products never bind the same host
# port.
services:
  postgres:
    image: postgres:16
    container_name: {{OPS_SLUG}}-postgres
    networks:
      - {{OPS_SLUG}}
    environment:
      POSTGRES_USER: {{OPS_SLUG}}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-{{OPS_SLUG}}}"
      POSTGRES_DB: {{OPS_SLUG}}
    volumes:
      - type: bind
        source: "${{{OPS_SLUG_UPPER}}_DATA:-${HOME}/.local/share/{{OPS_SLUG}}}/pgdata"
        target: /var/lib/postgresql/data
    ports:
      - "${{{OPS_SLUG_UPPER}}_POSTGRES_PORT:-{{OPS_POSTGRES_PORT}}}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # The credential broker. It holds the product's secrets and proxies
  # outbound traffic, injecting credentials on the wire so no agent container
  # ever sees raw secret material. The image is the real agent-vault broker
  # image (product-neutral: the same reference renders for every product slug
  # — it is NOT a <slug>-baked literal). The broker auto-unseals from
  # AGENT_VAULT_MASTER_PASSWORD, sourced from the instance environment (see
  # the rendered top-level .env.example).
  #
  # The CONTAINER ports are fixed: 14321 (broker API) and 14322 (HTTPS proxy
  # — the endpoint bin/shop-shell wires as HTTPS_PROXY=<broker>:14322). The
  # published HOST ports default to deterministic slug-derived values
  # ({{OPS_VAULT_API_PORT}} = 14321 + crc32(slug) % 1000,
  # {{OPS_VAULT_PROXY_PORT}} = 14322 + crc32(slug) % 1000) and are
  # env-overridable via {{OPS_SLUG_UPPER}}_VAULT_API_PORT /
  # {{OPS_SLUG_UPPER}}_VAULT_PROXY_PORT, mirroring the postgres host-port
  # derivation so two products never bind the same broker host port.
  agent-vault:
    image: infisical/agent-vault:latest
    container_name: {{OPS_SLUG}}-agent-vault
    networks:
      - {{OPS_SLUG}}
    cap_add:
      - IPC_LOCK
    environment:
      AGENT_VAULT_MASTER_PASSWORD: "${AGENT_VAULT_MASTER_PASSWORD}"
    volumes:
      - type: volume
        source: {{OPS_SLUG}}-agent-vault-data
        target: /vault/file
    ports:
      - "${{{OPS_SLUG_UPPER}}_VAULT_API_PORT:-{{OPS_VAULT_API_PORT}}}:14321"
      - "${{{OPS_SLUG_UPPER}}_VAULT_PROXY_PORT:-{{OPS_VAULT_PROXY_PORT}}}:14322"
    healthcheck:
      # sh-compatible TCP-liveness probe on the broker API port. The
      # infisical/agent-vault image runs sh (no bash), so the bash-only
      # device-file redirect probe can never work here; nc is shipped at
      # /usr/bin/nc.
      test: ["CMD", "nc", "-z", "127.0.0.1", "14321"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  {{OPS_SLUG}}:
    name: {{OPS_SLUG}}

volumes:
  {{OPS_SLUG}}-agent-vault-data:
    name: {{OPS_SLUG}}-agent-vault-data
